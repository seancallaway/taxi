services:

  db:
    image: postgres:18.3-alpine
    volumes:
      - psql_data:/var/lib/postgresql/
    environment:
      - POSTGRES_USER=taxi_user
      - POSTGRES_PASSWORD=uVOKd1zZBsQpk01Yt9N0
      - POSTGRES_DB=taxi_dev
    healthcheck:
      test: [ "CMD-SHELL", "sh -c 'pg_isready -U taxi_user -d taxi_dev '" ]
      interval: 10s
      timeout: 3s
      start_period: 1s
      retries: 3

  redis:
    image: redis:alpine
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 5

  server:
    build: ./server
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./server/:/usr/src/app/
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - ./.env.dev
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy



volumes:
  psql_data:

